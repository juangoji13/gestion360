name: Continuous Integration (Playwright E2E)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4

    - name: ⚙️ Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 📦 Instalar dependencias del proyecto
      run: npm ci

    - name: 🎭 Instalar navegadores de Playwright
      run: npx playwright install --with-deps chromium

    - name: 🧪 Ejecutar Tests Matemáticos (QA)
      run: npm run test:e2e
      env:
        # Estas variables deben matchear los Secretos configurados en tu repositorio de GitHub
        TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    - name: 📊 Guardar Reporte de Resultados
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 15
